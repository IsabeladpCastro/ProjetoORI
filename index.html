<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Filmes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Catálogo de Filmes - Árvore B+</h1>
    <input type="text" id="movieId" placeholder="Digite o ID do Filme">
    <button onclick="searchMovie()">Buscar Filme</button>
    <p id="result"></p>

    <script src="bplusTree.js"></script>
    
<script>
    document.addEventListener("DOMContentLoaded", () => {
        initializeTree();
    });

    async function searchMovie() {
        const id = parseInt(document.getElementById("movieId").value);
        const result = tree.search(id);

        document.getElementById("result").innerText = result
            ? `Filme encontrado: ${result.title}`
            : "Filme não encontrado.";
    }
</script>
</body>
</html>
